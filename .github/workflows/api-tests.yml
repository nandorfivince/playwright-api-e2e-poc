name: API E2E Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run all tests + generate reports
        run: npm test
        continue-on-error: true

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results -o playwright-report/allure --clean

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-reports
          path: playwright-report/
          retention-days: 30

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Print report URLs
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "  Reports available at:"
          echo "  Playwright HTML  → https://nandorfivince.github.io/playwright-api-e2e-poc/"
          echo "  Allure Report    → https://nandorfivince.github.io/playwright-api-e2e-poc/allure/index.html"
          echo "  Network Report   → https://nandorfivince.github.io/playwright-api-e2e-poc/network-report.html"
          echo "  Full Report      → https://nandorfivince.github.io/playwright-api-e2e-poc/full-report.html"
          echo "=========================================="

  deploy:
    needs: test-and-deploy
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
